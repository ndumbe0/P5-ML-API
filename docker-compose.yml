services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_KEY=sk-sepsis-2024-dev-key
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
    volumes:
      - ./model_metrics.json:/app/model_metrics.json
      - ./sepsis_model.joblib:/app/sepsis_model.joblib
      - ./scaler.joblib:/app/scaler.joblib
      - ./feature_columns.joblib:/app/feature_columns.joblib
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - API_KEY=sk-sepsis-2024-dev-key
    depends_on:
      api:
        condition: service_healthy
